paths:
  /projects:
    post:
      tags:
        - Projects
      summary: Create a new project
      description: Create a new project (MANAGER or ADMIN role required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Project name
                  example: "Website Redesign"
                description:
                  type: string
                  description: Project description
                  example: "Complete redesign of company website"
                status:
                  type: string
                  enum: [ACTIVE, ARCHIVED]
                  description: Project status
                  example: "ACTIVE"
      responses:
        "201":
          description: Project created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Project created successfully"
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "proj_123"
                      name:
                        type: string
                        example: "Website Redesign"
                      description:
                        type: string
                        example: "Complete redesign of company website"
                      status:
                        type: string
                        example: "ACTIVE"
                      ownerId:
                        type: string
                        example: "user_456"
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
        "400":
          description: Bad request - validation errors
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - insufficient permissions

    get:
      tags:
        - Projects
      summary: Get all projects
      description: Get all projects (MANAGER or ADMIN role required). ADMIN can see all projects, MANAGER can only see their own projects.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Projects fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Projects fetched successfully"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "proj_123"
                        name:
                          type: string
                          example: "Website Redesign"
                        description:
                          type: string
                          example: "Complete redesign of company website"
                        status:
                          type: string
                          example: "ACTIVE"
                        ownerId:
                          type: string
                          example: "user_456"
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
                  pagination:
                    type: object
                    properties:
                      currentPage:
                        type: integer
                        example: 1
                      totalPages:
                        type: integer
                        example: 5
                      totalItems:
                        type: integer
                        example: 50
                      itemsPerPage:
                        type: integer
                        example: 10
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - insufficient permissions
